    <circle cx="40" cy="41" r="4.5" fill="#cfe6c2"/>
    <circle cx="37.5" cy="39.5" r="1.1" fill="#4f4636"/>
    <circle cx="42.5" cy="39.5" r="1.1" fill="#4f4636"/>
    <path d="M37.5 43c1.4 1.5 4 1.5 5.4 0" stroke="#43899b" stroke-width="1.4" fill="none" stroke-linecap="round"/>
